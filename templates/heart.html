<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Heart Disease Predictor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px;
        }
        .navbar {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 10px;
            margin-bottom: 30px;
        }
        .navbar-brand, .nav-link {
            color: white !important;
        }
        .nav-link.active {
            font-weight: bold;
            border-bottom: 2px solid white;
        }
        .container {
            max-width: 1200px;
        }
        .card {
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            border: none;
            overflow: hidden;
        }
        .card-header {
            background: linear-gradient(135deg, #ff6b6b, #ff4757);
            color: white;
            padding: 20px;
            border: none;
        }
        .card-body {
            padding: 30px;
            background: white;
            max-height: 600px;
            overflow-y: auto;
        }
        .form-label {
            font-weight: 600;
            color: #555;
            margin-bottom: 5px;
            font-size: 0.9rem;
        }
        .form-control, .form-select {
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            padding: 8px;
            font-size: 0.9rem;
            width: 100%;
        }
        .btn-predict {
            background: linear-gradient(135deg, #ff6b6b, #ff4757);
            color: white;
            border: none;
            padding: 12px 40px;
            border-radius: 25px;
            font-size: 1.2rem;
            font-weight: 600;
            transition: all 0.3s;
        }
        .btn-predict:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(255, 107, 107, 0.4);
            color: white;
        }
        .btn-reset {
            background: #6c757d;
            color: white;
            border: none;
            padding: 12px 40px;
            border-radius: 25px;
            font-size: 1.2rem;
            font-weight: 600;
        }
        .result-card {
            background: linear-gradient(135deg, #ff6b6b, #ff4757);
            color: white;
            border-radius: 15px;
            padding: 30px;
            margin-top: 30px;
        }
        .row {
            margin-right: -10px;
            margin-left: -10px;
        }
        .col-md-6 {
            padding-right: 10px;
            padding-left: 10px;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container">
            <a class="navbar-brand" href="/"><i class="fas fa-heartbeat me-2"></i>Health Predictor</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="/">Home</a></li>
                    <li class="nav-item"><a class="nav-link active" href="/heart">Heart</a></li>
                    <li class="nav-item"><a class="nav-link" href="/lung">Lung</a></li>
                    <li class="nav-item"><a class="nav-link" href="/diabetes">Diabetes</a></li>
                    <li class="nav-item"><a class="nav-link" href="/kidney">Kidney</a></li>
                    <li class="nav-item"><a class="nav-link" href="/disease">Disease</a></li>
                    <li class="nav-item"><a class="nav-link" href="/hospitals">Hospitals</a></li>
                    <li class="nav-item"><a class="nav-link" href="/news">News</a></li>
                    <li class="nav-item"><a class="nav-link" href="/tools">Tools</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="card">
            <div class="card-header">
                <h3 class="mb-0"><i class="fas fa-heart me-2"></i>Heart Disease Risk Assessment</h3>
                <p class="mb-0 mt-2">Please fill in all 13 clinical parameters</p>
            </div>
            <div class="card-body">
                <form id="heartForm">
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Age (years)</label>
                            <input type="number" class="form-control" name="age" min="1" max="120" step="1" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Sex</label>
                            <select class="form-control" name="sex" required>
                                <option value="">Select</option>
                                <option value="1">Male</option>
                                <option value="0">Female</option>
                            </select>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Chest Pain Type</label>
                            <select class="form-control" name="cp" required>
                                <option value="">Select</option>
                                <option value="0">Typical Angina</option>
                                <option value="1">Atypical Angina</option>
                                <option value="2">Non-anginal Pain</option>
                                <option value="3">Asymptomatic</option>
                            </select>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Resting Blood Pressure (mm Hg)</label>
                            <input type="number" class="form-control" name="trestbps" min="80" max="250" step="1" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Cholesterol (mg/dl)</label>
                            <input type="number" class="form-control" name="chol" min="100" max="600" step="1" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Fasting Blood Sugar > 120 mg/dl</label>
                            <select class="form-control" name="fbs" required>
                                <option value="">Select</option>
                                <option value="1">Yes</option>
                                <option value="0">No</option>
                            </select>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Resting ECG Results</label>
                            <select class="form-control" name="restecg" required>
                                <option value="">Select</option>
                                <option value="0">Normal</option>
                                <option value="1">ST-T Wave Abnormality</option>
                                <option value="2">Left Ventricular Hypertrophy</option>
                            </select>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Maximum Heart Rate</label>
                            <input type="number" class="form-control" name="thalach" min="60" max="250" step="1" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Exercise Induced Angina</label>
                            <select class="form-control" name="exang" required>
                                <option value="">Select</option>
                                <option value="1">Yes</option>
                                <option value="0">No</option>
                            </select>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">ST Depression (oldpeak)</label>
                            <input type="number" step="0.1" class="form-control" name="oldpeak" min="0" max="10" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Slope of ST Segment</label>
                            <select class="form-control" name="slope" required>
                                <option value="">Select</option>
                                <option value="0">Upsloping</option>
                                <option value="1">Flat</option>
                                <option value="2">Downsloping</option>
                            </select>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Number of Major Vessels (0-3)</label>
                            <input type="number" class="form-control" name="ca" min="0" max="3" step="1" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Thalassemia</label>
                            <select class="form-control" name="thal" required>
                                <option value="">Select</option>
                                <option value="1">Normal</option>
                                <option value="2">Fixed Defect</option>
                                <option value="3">Reversible Defect</option>
                            </select>
                        </div>
                    </div>
                    <div class="text-center mt-4">
                        <button type="submit" class="btn-predict"><i class="fas fa-heartbeat me-2"></i>Predict Risk</button>
                        <button type="button" class="btn-reset ms-2" onclick="resetForm()"><i class="fas fa-redo me-2"></i>Reset</button>
                    </div>
                </form>
                
                <div id="loading" class="text-center mt-4" style="display: none;">
                    <div class="spinner-border text-danger" role="status"></div>
                    <p class="mt-2">Analyzing your data...</p>
                </div>
                
                <div id="resultCard" class="result-card" style="display: none;">
                    <h4 class="mb-3"><i class="fas fa-chart-line me-2"></i>Prediction Results</h4>
                    <div id="resultContent"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.getElementById('heartForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const formData = new FormData(e.target);
            const patientData = {};
            
            for (let [key, value] of formData.entries()) {
                patientData[key] = parseFloat(value);
            }
            
            document.getElementById('loading').style.display = 'block';
            document.getElementById('resultCard').style.display = 'none';
            
            try {
                const response = await fetch('/predict/heart', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({patient_data: patientData})
                });
                
                const result = await response.json();
                document.getElementById('loading').style.display = 'none';
                
                if (result.success) {
                    document.getElementById('resultContent').innerHTML = `
                        <div class="alert alert-success">
                            <h5 class="alert-heading"><i class="fas fa-heartbeat me-2"></i>Prediction Result:</h5>
                            <p class="display-6">${result.prediction}</p>
                            <hr>
                            <h6><i class="fas fa-exclamation-triangle me-2"></i>Risk Level:</h6>
                            <p class="lead">${result.risk_level}</p>
                            <h6><i class="fas fa-percent me-2"></i>Confidence:</h6>
                            <p class="lead">${result.confidence}</p>
                            <hr>
                            <p class="mb-0"><small>${result.message}</small></p>
                        </div>
                    `;
                    document.getElementById('resultCard').style.display = 'block';
                    document.getElementById('resultCard').scrollIntoView({ behavior: 'smooth' });
                } else {
                    alert('Error: ' + result.error);
                }
            } catch (error) {
                document.getElementById('loading').style.display = 'none';
                alert('Error: ' + error);
            }
        });
        
        function resetForm() {
            document.getElementById('heartForm').reset();
            document.getElementById('resultCard').style.display = 'none';
        }
    </script>
</body>
</html>
