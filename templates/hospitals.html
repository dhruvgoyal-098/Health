<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nearby Hospitals</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <!-- MapLibre GL for OpenFreeMap -->
    <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
    <link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet" />
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px;
        }
        .navbar {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 10px;
            margin-bottom: 30px;
        }
        .navbar-brand, .nav-link {
            color: white !important;
        }
        .nav-link.active {
            font-weight: bold;
            border-bottom: 2px solid white;
        }
        .container {
            max-width: 1400px;
        }
        .card {
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            border: none;
            overflow: hidden;
            margin-bottom: 30px;
        }
        .card-header {
            background: linear-gradient(135deg, #00b09b, #96c93d);
            color: white;
            padding: 20px;
            border: none;
        }
        .card-header h3 {
            margin: 0;
            font-weight: 600;
        }
        .card-body {
            padding: 30px;
            background: white;
        }
        #map {
            height: 500px;
            width: 100%;
            border-radius: 15px;
            margin-bottom: 20px;
            border: 3px solid #f0f0f0;
        }
        .hospital-card {
            background: white;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            transition: all 0.3s;
            border-left: 5px solid #00b09b;
        }
        .hospital-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }
        .hospital-name {
            font-size: 1.3rem;
            font-weight: 600;
            color: #333;
            margin-bottom: 10px;
        }
        .hospital-address {
            color: #666;
            margin-bottom: 10px;
            font-size: 0.95rem;
        }
        .hospital-rating {
            color: #ffc107;
            margin-bottom: 10px;
        }
        .hospital-rating span {
            color: #666;
            margin-left: 5px;
        }
        .hospital-phone {
            color: #00b09b;
            text-decoration: none;
            display: inline-block;
            margin-right: 15px;
        }
        .hospital-website {
            color: #667eea;
            text-decoration: none;
        }
        .hospital-website:hover, .hospital-phone:hover {
            text-decoration: underline;
        }
        .btn-locate {
            background: linear-gradient(135deg, #00b09b, #96c93d);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 25px;
            font-size: 1.1rem;
            font-weight: 600;
            transition: all 0.3s;
            margin-bottom: 20px;
        }
        .btn-locate:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0, 176, 155, 0.4);
            color: white;
        }
        .btn-directions {
            background: #667eea;
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 20px;
            font-size: 0.9rem;
            transition: all 0.3s;
            text-decoration: none;
            display: inline-block;
        }
        .btn-directions:hover {
            background: #5a67d8;
            color: white;
        }
        .loading-spinner {
            text-align: center;
            padding: 50px;
        }
        .badge-radius {
            background: #00b09b;
            color: white;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 0.85rem;
        }
        .hospital-stats {
            display: flex;
            gap: 20px;
            margin-top: 10px;
        }
        .stat-item {
            display: flex;
            align-items: center;
            gap: 5px;
            color: #666;
        }
        .user-marker {
            background: #00b09b;
            border: 3px solid white;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            box-shadow: 0 0 10px rgba(0,176,155,0.5);
        }
        .hospital-marker {
            background: #ff4757;
            color: white;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            border: 2px solid white;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }
        .maplibregl-popup-content {
            border-radius: 10px;
            padding: 15px;
            min-width: 200px;
        }
        .maplibregl-popup-content h6 {
            font-weight: 600;
            margin-bottom: 5px;
            color: #333;
        }
        .maplibregl-popup-content p {
            margin-bottom: 5px;
            color: #666;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container">
            <a class="navbar-brand" href="/"><i class="fas fa-heartbeat me-2"></i>Health Predictor</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="/">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="/heart">Heart</a></li>
                    <li class="nav-item"><a class="nav-link" href="/lung">Lung</a></li>
                    <li class="nav-item"><a class="nav-link" href="/diabetes">Diabetes</a></li>
                    <li class="nav-item"><a class="nav-link" href="/kidney">Kidney</a></li>
                    <li class="nav-item"><a class="nav-link" href="/disease">Disease</a></li>
                    <li class="nav-item"><a class="nav-link active" href="/hospitals">Hospitals</a></li>
                    <li class="nav-item"><a class="nav-link" href="/news">Health News</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="card">
            <div class="card-header">
                <h3 class="mb-0"><i class="fas fa-hospital me-2"></i>Nearby Hospitals</h3>
                <p class="mb-0 mt-2">Find hospitals and healthcare facilities near you (Powered by OpenFreeMap)</p>
            </div>
            <div class="card-body">
                <div class="text-center">
                    <button class="btn-locate" onclick="getUserLocation()">
                        <i class="fas fa-location-dot me-2"></i>Find Hospitals Near Me
                    </button>
                </div>
                
                <div id="map"></div>
                
                <div id="hospitalsList" class="row mt-4">
                    <div class="col-12 text-center text-muted">
                        <i class="fas fa-map-marker-alt fa-3x mb-3"></i>
                        <p>Click the button above to find nearby hospitals</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let map;
        let markers = [];
        let userLocation = null;
        let popup = null;

        function getUserLocation() {
            if (navigator.geolocation) {
                document.getElementById('hospitalsList').innerHTML = `
                    <div class="col-12">
                        <div class="loading-spinner">
                            <div class="spinner-border text-primary" role="status"></div>
                            <p class="mt-2">Getting your location...</p>
                        </div>
                    </div>
                `;
                
                navigator.geolocation.getCurrentPosition(
                    (position) => {
                        userLocation = {
                            lat: position.coords.latitude,
                            lng: position.coords.longitude
                        };
                        initMap();
                        findNearbyHospitals();
                    },
                    (error) => {
                        document.getElementById('hospitalsList').innerHTML = `
                            <div class="col-12">
                                <div class="alert alert-danger">
                                    <i class="fas fa-exclamation-triangle me-2"></i>
                                    Error getting your location: ${error.message}
                                </div>
                            </div>
                        `;
                    }
                );
            } else {
                alert('Geolocation is not supported by your browser');
            }
        }

        function initMap() {
            // Initialize map with OpenFreeMap
            map = new maplibregl.Map({
                container: 'map',
                style: 'https://tiles.openfreemap.org/styles/liberty',
                center: [userLocation.lng, userLocation.lat],
                zoom: 14
            });

            // Add navigation controls
            map.addControl(new maplibregl.NavigationControl(), 'top-right');

            // Add user location marker
            new maplibregl.Marker({
                color: '#00b09b',
                scale: 1.5
            })
                .setLngLat([userLocation.lng, userLocation.lat])
                .setPopup(new maplibregl.Popup().setHTML('<h6>Your Location</h6><p>You are here</p>'))
                .addTo(map);

            popup = new maplibregl.Popup({
                closeButton: false,
                closeOnClick: false
            });
        }

        async function findNearbyHospitals() {
            document.getElementById('hospitalsList').innerHTML = `
                <div class="col-12">
                    <div class="loading-spinner">
                        <div class="spinner-border text-primary" role="status"></div>
                        <p class="mt-2">Searching for nearby hospitals...</p>
                    </div>
                </div>
            `;

            try {
                // Use Overpass API to find hospitals
                const radius = 5000; // 5km
                const query = `
                    [out:json];
                    (
                        node["amenity"="hospital"](around:${radius},${userLocation.lat},${userLocation.lng});
                        way["amenity"="hospital"](around:${radius},${userLocation.lat},${userLocation.lng});
                    );
                    out body;
                `;

                const response = await fetch('https://overpass-api.de/api/interpreter', {
                    method: 'POST',
                    body: query
                });

                const data = await response.json();
                
                if (data.elements && data.elements.length > 0) {
                    displayHospitals(data.elements);
                    addHospitalMarkers(data.elements);
                } else {
                    document.getElementById('hospitalsList').innerHTML = `
                        <div class="col-12">
                            <div class="alert alert-warning">
                                <i class="fas fa-exclamation-triangle me-2"></i>
                                No hospitals found nearby. Try increasing the search radius.
                            </div>
                        </div>
                    `;
                }
            } catch (error) {
                console.error('Error fetching hospitals:', error);
                document.getElementById('hospitalsList').innerHTML = `
                    <div class="col-12">
                        <div class="alert alert-danger">
                            <i class="fas fa-exclamation-triangle me-2"></i>
                            Error finding hospitals. Please try again.
                        </div>
                    </div>
                `;
            }
        }

        function addHospitalMarkers(hospitals) {
            // Clear existing markers
            markers.forEach(marker => marker.remove());
            markers = [];

            hospitals.forEach((hospital, index) => {
                if (hospital.lat && hospital.lon) {
                    // Create custom marker element
                    const el = document.createElement('div');
                    el.className = 'hospital-marker';
                    el.textContent = (index + 1).toString();
                    el.style.backgroundColor = '#ff4757';
                    el.style.color = 'white';
                    el.style.borderRadius = '50%';
                    el.style.width = '30px';
                    el.style.height = '30px';
                    el.style.display = 'flex';
                    el.style.alignItems = 'center';
                    el.style.justifyContent = 'center';
                    el.style.fontWeight = 'bold';
                    el.style.border = '2px solid white';
                    el.style.boxShadow = '0 2px 5px rgba(0,0,0,0.2)';
                    el.style.cursor = 'pointer';

                    // Create marker
                    const marker = new maplibregl.Marker({ element: el })
                        .setLngLat([hospital.lon, hospital.lat])
                        .setPopup(new maplibregl.Popup().setHTML(`
                            <h6>${hospital.tags?.name || 'Hospital'}</h6>
                            <p>${hospital.tags?.['addr:street'] || 'Address not available'}</p>
                            ${hospital.tags?.phone ? `<p><i class="fas fa-phone"></i> ${hospital.tags.phone}</p>` : ''}
                        `))
                        .addTo(map);

                    markers.push(marker);
                }
            });
        }

        function displayHospitals(hospitals) {
            let html = '<div class="col-12"><h4 class="mb-3">Nearby Hospitals</h4></div>';
            
            // Filter and sort hospitals by distance
            const validHospitals = hospitals.filter(h => h.lat && h.lon);
            
            validHospitals.sort((a, b) => {
                const distA = getDistanceFromLatLonInKm(
                    userLocation.lat, userLocation.lng,
                    a.lat, a.lon
                );
                const distB = getDistanceFromLatLonInKm(
                    userLocation.lat, userLocation.lng,
                    b.lat, b.lon
                );
                return distA - distB;
            });

            validHospitals.forEach((hospital, index) => {
                const distance = getDistanceFromLatLonInKm(
                    userLocation.lat, userLocation.lng,
                    hospital.lat, hospital.lon
                );
                
                const mapsUrl = `https://www.openstreetmap.org/directions?engine=graphhopper_foot&route=${userLocation.lat},${userLocation.lng};${hospital.lat},${hospital.lon}`;
                
                html += `
                    <div class="col-md-6">
                        <div class="hospital-card">
                            <div class="d-flex justify-content-between align-items-start">
                                <h5 class="hospital-name">${index + 1}. ${hospital.tags?.name || 'Unnamed Hospital'}</h5>
                                <span class="badge-radius">${distance.toFixed(1)} km</span>
                            </div>
                            <p class="hospital-address">
                                <i class="fas fa-map-pin me-2"></i>${hospital.tags?.['addr:street'] || hospital.tags?.['addr:full'] || 'Address not available'}
                            </p>
                            ${hospital.tags?.phone ? `
                                <div class="hospital-stats">
                                    <div class="stat-item">
                                        <i class="fas fa-phone"></i>
                                        <span>${hospital.tags.phone}</span>
                                    </div>
                                </div>
                            ` : ''}
                            ${hospital.tags?.website ? `
                                <div class="hospital-stats">
                                    <div class="stat-item">
                                        <i class="fas fa-globe"></i>
                                        <a href="${hospital.tags.website}" target="_blank" class="text-decoration-none">Website</a>
                                    </div>
                                </div>
                            ` : ''}
                            <div class="mt-3">
                                <a href="${mapsUrl}" target="_blank" class="btn-directions">
                                    <i class="fas fa-directions me-2"></i>Get Directions
                                </a>
                            </div>
                        </div>
                    </div>
                `;
            });

            document.getElementById('hospitalsList').innerHTML = html;
        }

        function getDistanceFromLatLonInKm(lat1, lon1, lat2, lon2) {
            const R = 6371;
            const dLat = deg2rad(lat2 - lat1);
            const dLon = deg2rad(lon2 - lon1);
            const a = 
                Math.sin(dLat / 2) * Math.sin(dLat / 2) +
                Math.cos(deg2rad(lat1)) * Math.cos(deg2rad(lat2)) * 
                Math.sin(dLon / 2) * Math.sin(dLon / 2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
            return R * c;
        }

        function deg2rad(deg) {
            return deg * (Math.PI / 180);
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
