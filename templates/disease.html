<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>General Disease Predictor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px;
        }
        .navbar {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 10px;
            margin-bottom: 30px;
        }
        .navbar-brand, .nav-link {
            color: white !important;
        }
        .nav-link.active {
            font-weight: bold;
            border-bottom: 2px solid white;
        }
        .container {
            max-width: 1200px;
        }
        .card {
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            border: none;
            overflow: hidden;
        }
        .card-header {
            background: linear-gradient(135deg, #6c5ce7, #a29bfe);
            color: white;
            padding: 20px;
            border: none;
        }
        .card-body {
            padding: 30px;
            background: white;
        }
        .form-label {
            font-weight: 600;
            color: #555;
            margin-bottom: 5px;
            font-size: 0.9rem;
        }
        .form-check-label {
            font-size: 0.9rem;
            color: #555;
        }
        .form-check-input {
            margin-right: 5px;
        }
        .btn-predict {
            background: linear-gradient(135deg, #6c5ce7, #a29bfe);
            color: white;
            border: none;
            padding: 12px 40px;
            border-radius: 25px;
            font-size: 1.2rem;
            font-weight: 600;
            transition: all 0.3s;
        }
        .btn-predict:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(108, 92, 231, 0.4);
            color: white;
        }
        .btn-reset {
            background: #6c757d;
            color: white;
            border: none;
            padding: 12px 40px;
            border-radius: 25px;
            font-size: 1.2rem;
            font-weight: 600;
        }
        .result-card {
            background: linear-gradient(135deg, #6c5ce7, #a29bfe);
            color: white;
            border-radius: 15px;
            padding: 30px;
            margin-top: 30px;
        }
        .symptom-item {
            margin-bottom: 10px;
        }
        .search-box {
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container">
            <a class="navbar-brand" href="/"><i class="fas fa-heartbeat me-2"></i>Health Predictor</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="/">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="/heart">Heart</a></li>
                    <li class="nav-item"><a class="nav-link" href="/lung">Lung</a></li>
                    <li class="nav-item"><a class="nav-link" href="/diabetes">Diabetes</a></li>
                    <li class="nav-item"><a class="nav-link" href="/kidney">Kidney</a></li>
                    <li class="nav-item"><a class="nav-link active" href="/disease">Disease</a></li>
                    <li class="nav-item"><a class="nav-link" href="/hospitals">Hospitals</a></li>
                    <li class="nav-item"><a class="nav-link" href="/news">Health News</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="card">
            <div class="card-header">
                <h3 class="mb-0"><i class="fas fa-disease me-2"></i>General Disease Predictor</h3>
                <p class="mb-0 mt-2">Select your symptoms from the list below (134 symptoms total)</p>
            </div>
            <div class="card-body">
                <div class="row mb-4">
                    <div class="col-md-8">
                        <input type="text" class="form-control search-box" id="symptomSearch" placeholder="Search symptoms...">
                    </div>
                    <div class="col-md-4 text-end">
                        <button class="btn btn-outline-primary" onclick="selectAllSymptoms()"><i class="fas fa-check-double me-2"></i>Select All</button>
                        <button class="btn btn-outline-secondary" onclick="clearAllSymptoms()"><i class="fas fa-times me-2"></i>Clear All</button>
                    </div>
                </div>
                
                <form id="diseaseForm">
                    <div class="row" id="symptomsContainer">
                        <div class="text-center">
                            <div class="spinner-border text-primary" role="status"></div>
                        </div>
                    </div>
                    
                    <div class="text-center mt-4">
                        <button type="submit" class="btn-predict"><i class="fas fa-disease me-2"></i>Predict Disease</button>
                    </div>
                </form>
                
                <div id="loading" class="text-center mt-4" style="display: none;">
                    <div class="spinner-border text-primary" role="status"></div>
                    <p class="mt-2">Analyzing your symptoms...</p>
                </div>
                
                <div id="resultCard" class="result-card" style="display: none;">
                    <h4 class="mb-3"><i class="fas fa-clipboard-check me-2"></i>Diagnosis Results</h4>
                    <div id="resultContent"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const SYMPTOM_COLUMNS = [
            'itching', 'skin_rash', 'nodal_skin_eruptions', 'continuous_sneezing', 'shivering',
            'chills', 'joint_pain', 'stomach_pain', 'acidity', 'ulcers_on_tongue',
            'muscle_wasting', 'vomiting', 'burning_micturition', 'spotting_ urination', 'fatigue',
            'weight_gain', 'anxiety', 'cold_hands_and_feets', 'mood_swings', 'weight_loss',
            'restlessness', 'lethargy', 'patches_in_throat', 'irregular_sugar_level', 'cough',
            'high_fever', 'sunken_eyes', 'breathlessness', 'sweating', 'dehydration',
            'indigestion', 'headache', 'yellowish_skin', 'dark_urine', 'nausea',
            'loss_of_appetite', 'pain_behind_the_eyes', 'back_pain', 'constipation', 'abdominal_pain',
            'diarrhoea', 'mild_fever', 'yellow_urine', 'yellowing_of_eyes', 'acute_liver_failure',
            'fluid_overload', 'swelling_of_stomach', 'swelled_lymph_nodes', 'malaise',
            'blurred_and_distorted_vision', 'phlegm', 'throat_irritation', 'redness_of_eyes',
            'sinus_pressure', 'runny_nose', 'congestion', 'chest_pain', 'weakness_in_limbs',
            'fast_heart_rate', 'pain_during_bowel_movements', 'pain_in_anal_region', 'bloody_stool',
            'irritation_in_anus', 'neck_pain', 'dizziness', 'cramps', 'bruising', 'obesity',
            'swollen_legs', 'swollen_blood_vessels', 'puffy_face_and_eyes', 'enlarged_thyroid',
            'brittle_nails', 'swollen_extremeties', 'excessive_hunger', 'extra_marital_contacts',
            'drying_and_tingling_lips', 'slurred_speech', 'knee_pain', 'hip_joint_pain',
            'muscle_weakness', 'stiff_neck', 'swelling_joints', 'movement_stiffness',
            'spinning_movements', 'loss_of_balance', 'unsteadiness', 'weakness_of_one_body_side',
            'loss_of_smell', 'bladder_discomfort', 'foul_smell_of urine', 'continuous_feel_of_urine',
            'passage_of_gases', 'internal_itching', 'toxic_look_(typhos)', 'depression',
            'irritability', 'muscle_pain', 'altered_sensorium', 'red_spots_over_body', 'belly_pain',
            'abnormal_menstruation', 'dischromic _patches', 'watering_from_eyes',
            'increased_appetite', 'polyuria', 'family_history', 'mucoid_sputum', 'rusty_sputum',
            'lack_of_concentration', 'visual_disturbances', 'receiving_blood_transfusion',
            'receiving_unsterile_injections', 'coma', 'stomach_bleeding', 'distention_of_abdomen',
            'history_of_alcohol_consumption', 'fluid_overload.1', 'blood_in_sputum',
            'prominent_veins_on_calf', 'palpitations', 'painful_walking', 'pus_filled_pimples',
            'blackheads', 'scurring', 'skin_peeling', 'silver_like_dusting', 'small_dents_in_nails',
            'inflammatory_nails', 'blister', 'red_sore_around_nose', 'yellow_crust_ooze',
            'Urinating_a_lot', 'Heartburn'
        ];

        let currentSymptoms = [...SYMPTOM_COLUMNS];

        function displaySymptoms(symptoms) {
            const container = document.getElementById('symptomsContainer');
            let html = '';
            symptoms.forEach((symptom, index) => {
                const displayName = symptom.replace(/_/g, ' ').replace(/\b\w/g, l => l.toUpperCase());
                html += `
                    <div class="col-md-3 mb-2 symptom-item">
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" name="symptoms" value="${symptom}" id="symp${index}">
                            <label class="form-check-label" for="symp${index}">
                                ${displayName}
                            </label>
                        </div>
                    </div>
                `;
            });
            container.innerHTML = html;
        }

        window.onload = function() {
            displaySymptoms(SYMPTOM_COLUMNS);
        };

        document.getElementById('symptomSearch').addEventListener('input', function(e) {
            const searchTerm = e.target.value.toLowerCase();
            const filtered = SYMPTOM_COLUMNS.filter(s => s.toLowerCase().includes(searchTerm));
            displaySymptoms(filtered);
        });

        function selectAllSymptoms() {
            document.querySelectorAll('input[name="symptoms"]').forEach(cb => cb.checked = true);
        }

        function clearAllSymptoms() {
            document.querySelectorAll('input[name="symptoms"]').forEach(cb => cb.checked = false);
        }

        document.getElementById('diseaseForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const selected = [];
            document.querySelectorAll('input[name="symptoms"]:checked').forEach(cb => selected.push(cb.value));
            const symptomDict = {};
            SYMPTOM_COLUMNS.forEach(symptom => {
                symptomDict[symptom] = selected.includes(symptom) ? 1 : 0;
            });
            document.getElementById('loading').style.display = 'block';
            document.getElementById('resultCard').style.display = 'none';
            try {
                const response = await fetch('/predict/disease', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({symptom_dict: symptomDict})
                });
                const result = await response.json();
                document.getElementById('loading').style.display = 'none';
                if (result.success) {
                    document.getElementById('resultContent').innerHTML = `
                        <div class="alert alert-success">
                            <h5 class="alert-heading"><i class="fas fa-stethoscope me-2"></i>Predicted Disease:</h5>
                            <p class="display-6">${result.disease}</p>
                            <hr>
                            <h6><i class="fas fa-pills me-2"></i>Recommended Medicine:</h6>
                            <p class="lead">${result.medicine}</p>
                            <hr>
                            <p class="mb-0"><small>Confidence: ${result.confidence}</small></p>
                        </div>
                    `;
                    document.getElementById('resultCard').style.display = 'block';
                } else {
                    alert('Error: ' + result.error);
                }
            } catch (error) {
                document.getElementById('loading').style.display = 'none';
                alert('Error: ' + error);
            }
        });
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
